version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # Speech Slurring Detection API
  # ═══════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: slurring_detection_api
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cpu
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    volumes:
      - ../models:/app/models
      - ../data:/app/data
      - ../logs:/app/logs
      - ../reports:/app/reports
    depends_on:
      - redis
      - mlflow
    restart: unless-stopped
    networks:
      - slurring_network

  # ═══════════════════════════════════════════════════════════════════════════
  # Redis (for rate limiting and caching)
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: slurring_detection_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - slurring_network

  # ═══════════════════════════════════════════════════════════════════════════
  # MLflow (experiment tracking and model registry)
  # ═══════════════════════════════════════════════════════════════════════════
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    container_name: slurring_detection_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - MLFLOW_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    restart: unless-stopped
    networks:
      - slurring_network

  # ═══════════════════════════════════════════════════════════════════════════
  # Prometheus (metrics collection)
  # ═══════════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: slurring_detection_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - slurring_network

  # ═══════════════════════════════════════════════════════════════════════════
  # Grafana (metrics visualization)
  # ═══════════════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: slurring_detection_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - slurring_network

networks:
  slurring_network:
    driver: bridge

volumes:
  redis_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
